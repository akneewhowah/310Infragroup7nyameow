- name: Copy agent executable to target
  copy:
    src: "files/agent.py"
    dest: "{{ whackamole_agent_deploy_dir }}/{{ whackamole_agent_executable }}"
    owner: root
    group: root
    mode: '0755'
  when: ansible_facts.os_family != "Windows" 

- name: Install venv support for Debian
  ansible.builtin.package:
    name: python3-venv
  when: ansible_os_family == "Debian"

- name: Create empty virtual environment
  ansible.builtin.command:
    cmd: "python3 -m venv {{ [whackamole_agent_deploy_dir, 'venv'] | path_join }}"
    creates: "{{ [whackamole_agent_deploy_dir, 'venv'] | path_join }}"
  when: ansible_facts.os_family != "Windows"

- name: Create empty virtual environment on Windows
  ansible.windows.win_command: "python -m venv {{ [whackamole_agent_deploy_dir, 'venv'] | path_join }}"
  args:
    creates: "{{ [whackamole_agent_deploy_dir, 'venv'] | path_join }}\\Scripts\\python.exe"
  when: ansible_facts.os_family == "Windows"

