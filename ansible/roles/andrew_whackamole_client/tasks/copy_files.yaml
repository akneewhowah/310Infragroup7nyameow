- name: Copy NSSM executable to target
  win_copy:
    src: "files/nssm-2.24_win64.exe"
    dest: "{{ whackamole_agent_deploy_dir }}\\nssm.exe"
  when: ansible_facts.os_family == "Windows"

- name: Update whackamole_server_url value
  replace:
    path: "{{ whackamole_agent_deploy_dir }}/{{ whackamole_agent_executable }}"
    regexp: '^SERVER_URL=.*'
    replace: 'SERVER_URL="{{ whackamole_server_url }}"'
  when: ansible_facts.os_family != "Windows"

- name: Update whackamole_agent_name value
  replace:
    path: "{{ whackamole_agent_deploy_dir }}/{{ whackamole_agent_executable }}"
    regexp: '^AGENT_NAME=.*'
    replace: 'AGENT_NAME="{{ whackamole_agent_name }}"'
  when: ansible_facts.os_family != "Windows"

- name: Update whackamole_agent_type value
  replace:
    path: "{{ whackamole_agent_deploy_dir }}/{{ whackamole_agent_executable }}"
    regexp: '^AGENT_NAME=.*'
    replace: 'AGENT_NAME="{{ whackamole_agent_type }}"'
  when: ansible_facts.os_family != "Windows"

- name: Update whackamole_auth_token value
  replace:
    path: "{{ whackamole_agent_deploy_dir }}/{{ whackamole_agent_executable }}"
    regexp: '^AUTH_TOKEN=.*'
    replace: 'AUTH_TOKEN="{{ whackamole_auth_token }}"'
  when: ansible_facts.os_family != "Windows"

- name: Update whackamole_server_url value
  community.windows.win_lineinfile:
    path: "{{ whackamole_agent_deploy_dir }}\\{{ whackamole_agent_executable }}"
    regexp: '^SERVER_URL=.*'
    line: 'SERVER_URL={{ whackamole_server_url }}'
    backrefs: yes
  when: ansible_facts.os_family == "Windows"

- name: Update whackamole_agent_name value
  community.windows.win_lineinfile:
    path: "{{ whackamole_agent_deploy_dir }}\\{{ whackamole_agent_executable }}"
    regexp: '^SERVER_URL=.*'
    line: 'AGENT_NAME={{ whackamole_agent_name }}'
    backrefs: yes
  when: ansible_facts.os_family == "Windows"

- name: Update whackamole_agent_type value
  community.windows.win_lineinfile:
    path: "{{ whackamole_agent_deploy_dir }}\\{{ whackamole_agent_executable }}"
    regexp: '^AGENT_TYPE=.*'
    line: 'AGENT_TYPE={{ whackamole_agent_type }}'
    backrefs: yes
  when: ansible_facts.os_family == "Windows"

- name: Update whackamole_auth_token value
  community.windows.win_lineinfile:
    path: "{{ whackamole_agent_deploy_dir }}\\{{ whackamole_agent_executable }}"
    regexp: '^AUTH_TOKEN=.*'
    line: 'AUTH_TOKEN={{ whackamole_auth_token }}'
    backrefs: yes
  when: ansible_facts.os_family == "Windows"

- name: Apply Timestomp (Linux)
  ansible.builtin.file:
    path: "{{ item }}"
    state: file
    modification_time: "{{ linux_ref.stat.mtime | string | split('.') | first }}"
    access_time: "{{ linux_ref.stat.atime | string | split('.') | first }}"
  loop:
    - "{{ whackamole_agent_deploy_dir }}"
    - "{{ whackamole_agent_deploy_dir }}/{{ whackamole_agent_executable }}"
  when: ansible_os_family != "Windows"

- name: Apply Timestomp (Windows)
  ansible.windows.win_shell: |
    $refDate = Get-Date "{{ win_ref.stat.lastwritetime | string }}"
    $targets = @(
        "{{ whackamole_agent_deploy_dir }}",
        "$(Join-Path "{{ whackamole_agent_deploy_dir }}" "{{ whackamole_agent_executable }}")"
    )
    foreach ($t in $targets) {
        if (Test-Path $t) {
            (Get-Item $t).LastWriteTime = $refDate
            (Get-Item $t).CreationTime = $refDate
            (Get-Item $t).LastAccessTime = $refDate
        }
    }
  when: ansible_os_family == "Windows"