---
- name: Get reference file stats (Linux)
  ansible.builtin.stat:
    path: "{{ whackamole_timestomp_ref_unix }}"
  register: linux_ref
  when: ansible_os_family != "Windows"

- name: Get reference file stats (Windows)
  ansible.windows.win_stat:
    path: "{{ whackamole_timestomp_ref_win }}"
  register: win_ref
  when: ansible_os_family == "Windows"

- name: Ensure destination directory exists
  ansible.windows.win_file:
    path: "{{ whackamole_agent_deploy_dir }}"
    state: directory
  when: ansible_facts.os_family == "Windows" 

- name: Ensure destination directory exists
  ansible.builtin.file:
    path: "{{ whackamole_agent_deploy_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: ansible_facts.os_family != "Windows" 

- name: Copy agent executable to target
  win_copy:
    src: "files/agent.py"
    dest: "{{ whackamole_agent_deploy_dir }}\\{{ whackamole_agent_executable }}"
  when: ansible_facts.os_family == "Windows" 

