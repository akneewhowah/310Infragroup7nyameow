---
- name: Reload systemd to recognize new service unit
  ansible.builtin.systemd:
    daemon_reload: yes
  when: ansible_os_family in ["RedHat", "Debian", "Alpine"]
  
- name: Start Service (Linux/Unix)
  service:
    name: "{{ whackamole_service_name}}"
    state: started
    enabled: yes
  when: ansible_os_family in ["RedHat", "Debian", "Alpine", "FreeBSD"]

- name: Start Service (Windows)
  win_service:
    name: "{{ whackamole_service_name }}"
    start_mode: auto
    state: started
  when: ansible_os_family == "Windows"