---
- name: Check if systemd service exists
  stat:
    path: "/etc/systemd/system/{{ whackamole_service_name }}.service"
  register: systemd_file
  when: ansible_os_family in ["RedHat", "Debian"]

- name: Remove systemd Service
  block:
    - name: Stop and disable systemd service
      systemd:
        name: "{{ whackamole_service_name }}"
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Remove systemd unit file
      file:
        path: "/etc/systemd/system/{{ whackamole_service_name }}.service"
        state: absent

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
  when: 
    - ansible_os_family in ["RedHat", "Debian"]
    - systemd_file.stat.exists

# --- Windows: NSSM ---
- name: Remove Service (NSSM)
  win_shell: |
    $ServiceName = "{{ whackamole_service_name }}"
    $NssmPath = "{{ whackamole_deploy_dir }}\nssm.exe"
    
    if (Get-Service $ServiceName -ErrorAction SilentlyContinue) {
        & $NssmPath stop $ServiceName
        & $NssmPath remove $ServiceName confirm
    }
  when: ansible_os_family == "Windows"

############################################
# Remove Files
############################################

- name: Remove deploy files Linux
  ansible.builtin.file:
    path: '{{ whackamole_deploy_dir }}'
    state: absent
  when: 
    - ansible_os_family != "Windows"
  ignore_errors: yes

- name: Remove deploy files Windows
  ansible.windows.win_file:
    path: '{{ whackamole_deploy_dir }}'
    state: absent
  when: 
    - ansible_os_family == "Windows"
  ignore_errors: yes