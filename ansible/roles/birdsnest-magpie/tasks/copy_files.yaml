---
- name: Ensure base packages are present
  ansible.builtin.package:
    name:
      - git
      - python3
      - bash
    state: present

- name: Install Debian-specific persistence tools
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install RHEL-specific persistence tools
  ansible.builtin.dnf:
    name: iptables-services
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure iptables service is enabled (RHEL)
  ansible.builtin.systemd:
    name: iptables
    enabled: yes
    state: started
  when: ansible_os_family == "RedHat"

- name: Ensure destination directory exists
  ansible.windows.win_file:
    path: "{{ magpie_deploy_dir }}"
    state: directory
  when: ansible_facts.os_family == "Windows" 

- name: Ensure destination directory exists
  ansible.builtin.file:
    path: "{{ magpie_deploy_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: ansible_facts.os_family != "Windows" 

- name: Copy agent executable to target
  win_copy:
    src: "files/{{ magpie_agent_executable }}"
    dest: "{{ magpie_deploy_dir }}\\{{ magpie_agent_executable }}"
  when: ansible_facts.os_family == "Windows" 

- name: Copy tester executable to target
  win_copy:
    src: "files/{{ magpie_tester_executable }}"
    dest: "{{ magpie_deploy_dir }}\\{{ magpie_tester_executable }}"
  when: ansible_facts.os_family == "Windows" and magpie_include_tester

- name: Render config.json from template
  template:
    src: "config.json.j2"
    dest: "{{ [magpie_deploy_dir, 'config.json'] | path_join }}"

- name: Copy requirements to target
  win_copy:
    src: "files/requirements.txt"
    dest: "{{ magpie_deploy_dir }}\\requirements.txt"
  when: ansible_facts.os_family == "Windows" 

- name: Copy requirements to target
  copy:
    src: "files/requirements.txt"
    dest: "{{ magpie_deploy_dir }}/requirements.txt"
    owner: root
    group: root
    mode: '0755'
  when: ansible_facts.os_family != "Windows"

- name: Install venv support for Debian
  ansible.builtin.package:
    name: python3-venv
  when: ansible_os_family == "Debian"

- name: Create venv and install requirements
  ansible.builtin.pip:
    requirements: "{{ [magpie_deploy_dir, 'requirements.txt'] | path_join }}"
    virtualenv: "{{ [magpie_deploy_dir, 'venv'] | path_join }}"
    virtualenv_command: "{{ (ansible_os_family == 'Windows') | ternary('python -m venv', 'python3 -m venv') }}"
    state: present
  vars:
    base_dir: "{{ (ansible_facts.os_family == 'Windows') | ternary('python -m venv --with-pip', 'python3 -m venv --with-pip') }}"
  when: ansible_facts.os_family != "Windows"

- name: Copy agent executable to target
  copy:
    src: "files/{{ magpie_agent_executable }}"
    dest: "{{ magpie_deploy_dir }}/{{ magpie_agent_executable }}"
    owner: root
    group: root
    mode: '0755'
  when: ansible_facts.os_family != "Windows" 

- name: Copy tester executable to target
  copy:
    src: "files/{{ magpie_tester_executable }}"
    dest: "{{ magpie_deploy_dir }}/{{ magpie_tester_executable }}"
    owner: root
    group: root
    mode: '0755'
  when: ansible_facts.os_family != "Windows" and magpie_include_tester

- name: Copy NSSM executable to target
  win_copy:
    src: "files/nssm-2.24_win64.exe"
    dest: "{{ magpie_deploy_dir }}\\nssm.exe"
  when: ansible_facts.os_family == "Windows"