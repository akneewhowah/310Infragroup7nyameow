- name: Check if Magpie systemd service exists
  stat:
    path: "/etc/systemd/system/magpie-{{ magpie_agent_name }}.service"
  register: systemd_file
  when: ansible_os_family in ["RedHat", "Debian"]

- name: Remove systemd Magpie Service
  block:
    - name: Stop and disable systemd service
      systemd:
        name: "magpie-{{ magpie_agent_name }}"
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Remove systemd unit file
      file:
        path: "/etc/systemd/system/magpie-{{ magpie_agent_name }}.service"
        state: absent

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
  when: 
    - ansible_os_family in ["RedHat", "Debian"]
    - systemd_file.stat.exists

# --- Linux: OpenRC (Alpine) ---
- name: Check if Magpie OpenRC service exists
  stat:
    path: "/etc/init.d/magpie-{{ magpie_agent_name }}"
  register: openrc_file
  when: ansible_os_family == "Alpine"

- name: Remove OpenRC Magpie Service
  block:
    - name: Stop OpenRC service
      service:
        name: "magpie-{{ magpie_agent_name }}"
        state: stopped
      ignore_errors: yes

    - name: Remove OpenRC init script
      file:
        path: "/etc/init.d/magpie-{{ magpie_agent_name }}"
        state: absent
  when: 
    - ansible_os_family == "Alpine"
    - openrc_file.stat.exists

# --- FreeBSD: rc.d ---
- name: Check if Magpie FreeBSD rc.d script exists
  stat:
    path: "/usr/local/etc/rc.d/magpie_{{ magpie_agent_name }}"
  register: rcd_file
  when: ansible_os_family == "FreeBSD"

- name: Remove FreeBSD Magpie Service
  block:
    - name: Stop FreeBSD service
      service:
        name: "magpie_{{ magpie_agent_name }}"
        state: stopped
      ignore_errors: yes

    - name: Remove rc.d script
      file:
        path: "/usr/local/etc/rc.d/magpie_{{ magpie_agent_name }}"
        state: absent
  when: 
    - ansible_os_family == "FreeBSD"
    - rcd_file.stat.exists

# --- Windows: NSSM ---
- name: Remove Magpie Service (NSSM)
  win_shell: |
    $ServiceName = "magpie-{{ magpie_agent_name }}"
    $NssmPath = "{{ magpie_deploy_dir }}\nssm.exe"
    
    if (Get-Service $ServiceName -ErrorAction SilentlyContinue) {
        # Stop the service and remove it from the registry
        & $NssmPath stop $ServiceName
        & $NssmPath remove $ServiceName confirm
    }
  when: ansible_os_family == "Windows"
      
############################################
# Remove Files
############################################

- name: Remove deploy files Linux
  ansible.builtin.file:
    path: '{{ magpie_deploy_dir }}'
    state: absent
  when: 
    - ansible_os_family != "Windows"
  ignore_errors: yes

- name: Remove deploy files Windows
  ansible.windows.win_file:
    path: '{{ magpie_deploy_dir }}'
    state: absent
  when: 
    - ansible_os_family == "Windows"
  ignore_errors: yes