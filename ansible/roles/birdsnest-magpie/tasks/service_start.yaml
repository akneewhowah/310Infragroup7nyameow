---
- name: Reload systemd to recognize new Magpie unit
  ansible.builtin.systemd:
    daemon_reload: yes
  when: ansible_os_family in ["RedHat", "Debian", "Alpine"]
  
- name: Start Magpie Service (Linux/Unix)
  service:
    name: "magpie-{{ magpie_agent_name if ansible_os_family != 'FreeBSD' else '_' + magpie_agent_name }}"
    state: started
    enabled: yes
  when: ansible_os_family in ["RedHat", "Debian", "Alpine", "FreeBSD"]

- name: Start Magpie Service (Windows)
  win_service:
    name: "magpie-{{ magpie_agent_name }}"
    start_mode: auto
    state: started
  when: ansible_os_family == "Windows"