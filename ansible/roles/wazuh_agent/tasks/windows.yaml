---
- name: Ensure agent script directory exists
  win_file:
    path: "{{ wazuh_installer_win_path | win_dirname }}"
    state: directory

- name: Copy agent script to hidden directory
  win_copy:
    src: files/wazuh-agent-4.14.4-1-windows.msi
    dest: "{{ wazuh_installer_win_path }}"

- name: Run Wazuh agent installer
  ansible.windows.win_shell: >
    msiexec /i "{{ wazuh_installer_win_path }}"
    /qn
    WAZUH_MANAGER={{ wazuh_manager_ip }}
  args:
    executable: cmd
  register: wazuh_install
  changed_when: "'ReturnValue = 0' in wazuh_install.stdout or wazuh_install.rc == 0"
    
- name: Ensure Wazuh service is started and enabled
  ansible.windows.win_service:
    name: WazuhSvc
    start_mode: auto
    state: started

- name: Remove installer after installation
  ansible.windows.win_file:
    path: "{{ wazuh_installer_win_path }}"
    state: absent