---
- name: Cleanup existing instance
  ansible.builtin.include_tasks: cleanup.yaml

- name: Install Python
  ansible.builtin.include_tasks: install_python.yaml

- name: Copy files
  ansible.builtin.include_tasks: copy_files.yaml

- name: Deploy Services
  ansible.builtin.include_tasks: service_install.yaml
  when: not kingfisher_docker

- name: Start Services
  ansible.builtin.include_tasks: service_start.yaml
  when: kingfisher_service_start and not kingfisher_docker

- name: Run agent by hand
  ansible.builtin.shell: |
    /venv/bin/python3 agent.py &
  args:
        chdir: "{{ kingfisher_deploy_dir }}"

