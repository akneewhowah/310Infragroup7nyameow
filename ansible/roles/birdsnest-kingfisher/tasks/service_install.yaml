- name: Install kingfisher Agent as a Windows Service
  community.windows.win_nssm:
    name: "kingfisher-{{ kingfisher_agent_name }}"
    executable: "{{ [kingfisher_deploy_dir,'nssm.exe'] | path_join }}"
    application: "{{ [kingfisher_deploy_dir, 'venv', 'Scripts', 'python.exe'] | path_join }}"
    app_parameters: "{{ [kingfisher_deploy_dir, 'agent.py'] | path_join }}"
    app_directory: "{{ kingfisher_deploy_dir }}"
    username: "LocalSystem"
    state: present
  when: ansible_os_family == "Windows"