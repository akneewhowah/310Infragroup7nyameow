---
- name: Deploy kingfisher Service systemd
  copy:
    dest: /etc/systemd/system/kingfisher-{{ kingfisher_agent_name }}.service
    content: |
      [Unit]
      Description=kingfisher Agent for {{ kingfisher_agent_name }}
      After=network.target

      [Service]
      User=root
      WorkingDirectory={{ kingfisher_deploy_dir }}
      ExecStart={{ kingfisher_deploy_dir }}/venv/bin/python3 agent.py
      Restart=always

      [Install]
      WantedBy=multi-user.target
  when: ansible_os_family in ["RedHat", "Debian"]

- name: Deploy kingfisher Service OpenRC
  copy:
    dest: "/etc/init.d/kingfisher-{{ kingfisher_agent_name }}"
    mode: '0755'
    content: |
      #!/sbin/openrc-run
      name="kingfisher-{{ kingfisher_agent_name }}"
      command="{{ kingfisher_deploy_dir }}/venv/bin/python3"
      command_args="agent.py"
      directory="{{ kingfisher_deploy_dir }}"
      command_background="yes"
      pidfile="/run/${RC_SVCNAME}.pid"
  when: ansible_os_family == "Alpine"

- name: Deploy kingfisher Service rc.d
  copy:
    dest: "/usr/local/etc/rc.d/kingfisher_{{ kingfisher_agent_name }}"
    mode: '0555'
    content: |
      #!/bin/sh
      # PROVIDE: kingfisher_{{ kingfisher_agent_name }}
      # REQUIRE: LOGIN
      . /etc/rc.subr
      name="kingfisher_{{ kingfisher_agent_name }}"
      rcvar="kingfisher_{{ kingfisher_agent_name }}_enable"
      command="{{ kingfisher_deploy_dir }}/venv/bin/python3"
      command_args="agent.py &"
      kingfisher_{{ kingfisher_agent_name }}_chdir="{{ kingfisher_deploy_dir }}"
      load_rc_config $name
      run_rc_command "$1"
  when: ansible_os_family == "FreeBSD"

