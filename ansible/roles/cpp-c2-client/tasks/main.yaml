---
- name: Ensure destination directory exists
  ansible.windows.win_file:
    path: "{{ cppc2_deploy_path | win_dirname }}"
    state: directory
  when: ansible_facts.os_family == "Windows" 

- name: Copy agent executable to target
  win_copy:
    src: "files/agent.exe"
    dest: "{{ cppc2_deploy_path }}"
  when: ansible_facts.os_family == "Windows" 

