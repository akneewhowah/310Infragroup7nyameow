---
- name: Ping Linux
  hosts: linux
  gather_facts: no
  tags:
    - ping
    - ping_linux
    - linux
    - generic
    - inscope
  tasks:
    - name: Ping Linux
      ansible.builtin.ping:

- name: Ping Windows
  hosts: windows
  gather_facts: no
  tags: 
    - ping
    - ping_windows
    - windows
    - generic
    - inscope
    - full
  tasks:
    - name: Ping Windows
      ansible.windows.win_ping:

#########################
# Linux Infra
#########################

- name: Deploy Rustdesk Linux
  hosts: linux:&gui
  roles:
    - linux_rustdesk
  tags:
    - linux 
    - inscope 
    - rustdesk
    - rustdesk_linux
    - generic
    - full

- name: Change Rustdesk Password
  hosts: linux:&gui:&jumpboxes
  roles:
    - linux_rustdesk_changepwd
  tags:
    - rustdesk_pwd
    - full

- name: Deploy GOST for Proxy Nodes
  hosts: proxy
  roles:
    - gost_boundary
  tags:
    - gost
    - gost_boundary
    - full

- name: Deploy GOST for Manager Node
  hosts: proxy_central
  roles:
    - gost_central
  tags:
    - gost
    - gost_central
    - full

- name: Deploy GOST for Red Team jumpboxes
  hosts: jumpred
  roles:
    - gost_internal
  tags:
    - gost
    - gost_internal
    - full

#########################
# Inscope
#########################

- name: Deploy Linux Users
  hosts: linux:&inscope
  roles:
    - linux_users
  tags:
    - linux 
    - inscope 
    - users
    - users_linux
    - generic
    - full

- name: Deploy Windows Local Users
  hosts: windows:&inscope:!ad
  roles:
    - windows_users_local
  tags:
    - windows 
    - inscope 
    - users
    - users_windows
    - users_windows_local
    - generic
    - full

- name: Deploy Windows AD Users
  hosts: ad:&inscope
  roles:
    - windows_users_ad
  tags:
    - windows 
    - inscope 
    - users
    - users_windows
    - users_windows_ad
    - generic
    - full

- name: Andrew - Deploy pyc2 Server
  hosts: all
  roles:
    - andrew_pyc2_server
  tags:
    - andrew
    - pyc2
    - pyc2_server
    - full

- name: Andrew - Deploy pyc2 Client
  hosts: inscope
  roles:
    - andrew_pyc2_client
  tags:
    - andrew
    - pyc2
    - pyc2_client
    - full

