---
- name: Toggle MySQL State (Break / Restore)
  hosts: ubuntu_vms
  become: true

  vars:
    state: restored   # 🔴 change to "restored" to undo everything

  tasks:

  # ─────────────────────────────────────────────
  # 🔴 BREAK STATE
  # ─────────────────────────────────────────────
  - name: Stop MySQL
    systemd:
      name: mysql
      state: stopped
    when: state == "broken"

  - name: Disable MySQL
    systemd:
      name: mysql
      enabled: no
    when: state == "broken"

  - name: Mask MySQL
    command: systemctl mask mysql
    when: state == "broken"

  # - name: Kill MySQL processes
  #   shell: |
  #     pkill -9 mysqld || true
  #     pkill -9 mysql || true
  #   when: state == "broken"

  # - name: Break mysqld binary
  #   file:
  #     path: /usr/sbin/mysqld
  #     mode: '0000'
  #   when: state == "broken"

  # - name: Create fake override
  #   file:
  #     path: /etc/systemd/system/mysql.service.d
  #     state: directory
  #   when: state == "broken"

  # - name: Drop fake override config
  #   copy:
  #     dest: /etc/systemd/system/mysql.service.d/override.conf
  #     content: |
  #       [Service]
  #       ExecStart=
  #       ExecStart=/bin/false
  #   when: state == "broken"

  # Optional watcher (if you want persistence)
  # - name: Install fake watcher service
  #   copy:
  #     dest: /etc/systemd/system/net-helper.service
  #     content: |
  #       [Unit]
  #       Description=Network Helper

  #       [Service]
  #       ExecStart=/bin/bash -c 'while true; do systemctl stop mysql; sleep 30; done'

  #       [Install]
  #       WantedBy=multi-user.target
  #   when: state == "broken"

  # - name: Enable watcher
  #   systemd:
  #     name: net-helper
  #     enabled: yes
  #     state: started
  #   when: state == "broken"

  # ─────────────────────────────────────────────
  # 🟢 RESTORE STATE
  # ─────────────────────────────────────────────
  - name: Stop watcher
    systemd:
      name: net-helper
      state: stopped
    ignore_errors: true
    when: state == "restored"

  - name: Disable watcher
    systemd:
      name: net-helper
      enabled: no
    ignore_errors: true
    when: state == "restored"

  - name: Remove watcher service
    file:
      path: /etc/systemd/system/net-helper.service
      state: absent
    when: state == "restored"

  - name: Remove override config
    file:
      path: /etc/systemd/system/mysql.service.d
      state: absent
    when: state == "restored"

  - name: Unmask MySQL
    command: systemctl unmask mysql
    when: state == "restored"

  - name: Enable MySQL
    systemd:
      name: mysql
      enabled: yes
    when: state == "restored"

  - name: Fix mysqld permissions
    file:
      path: /usr/sbin/mysqld
      mode: '0755'
    when: state == "restored"

  - name: Reload systemd
    command: systemctl daemon-reload
    when: state == "restored"

  - name: Start MySQL
    systemd:
      name: mysql
      state: started
    when: state == "restored"