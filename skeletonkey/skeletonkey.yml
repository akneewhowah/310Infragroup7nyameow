---
- name: Configure sshd
  hosts: all

  tasks:
  - name: Determine random file locations
    ansible.builtin.set_fact:
      sshd_conf_loc: "{{ sshd_conf_loc_opts }}"
      sshd_incl_loc: "{{ sshd_incl_loc_opts }}"
      keys_loc: "{{ keys_loc_opts }}"
    run_once: yes

  - name: Add new sshd conf override dir
    ansible.builtin.file:
      path: "{{ sshd_incl_loc[0] }}"
      state: directory
      mode: "755"
    become: yes

  - name: Add sshd conf override
    ansible.builtin.template:
      src: "templates/sshd_config_override.j2"
      dest: "{{ sshd_incl_loc | join() }}"
      owner: root
      group: root
    become: yes

  - name: Add new sshd conf dir
    ansible.builtin.file:
      path: "{{ sshd_conf_loc[0] }}"
      state: directory
      mode: "755"
    become: yes

  - name: Add new sshd conf
    ansible.builtin.template:
      src: "templates/sshd_config.j2"
      dest: "{{ sshd_conf_loc | join() }}"
      owner: root
      group: root
    become: yes

  - name: Add new keys dir
    ansible.builtin.file:
      path: "{{ keys_loc[0] }}"
      state: directory
      mode: "755"
    become: yes

  - name: Add new keys file
    ansible.builtin.copy:
      src: "files/keys"
      dest: "{{ keys_loc | join() }}"
      owner: root
      group: root
    become: yes

  - name: Alter sshd service
    ansible.builtin.template:
      src: "templates/ssh.service.j2"
      dest: "/lib/systemd/system/ssh.service"
      owner: root
      group: root
    become: yes

  - name: Reload sshd
    ansible.builtin.systemd_service:
      name: ssh
      state: restarted
      daemon_reload: true
    become: yes
